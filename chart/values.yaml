plane-enterprise:
  fullnameOverride: infra-plane
  license:
    licenseDomain: plane.127.0.0.1.sslip.io
  env:
    web_url: http://plane.127.0.0.1.sslip.io:32080
    storageClass: hostpath
  planeVersion: v2.4.0
  ingress:
    enabled: true
    ingressClass: kong
  services:
    worker:
      memoryLimit: 2Gi
      memoryRequest: 512Mi
      cpuLimit: 1000m
      cpuRequest: 250m
