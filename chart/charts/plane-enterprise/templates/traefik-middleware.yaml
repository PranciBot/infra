{{- if and .Values.ingress.enabled (hasPrefix "traefik" .Values.ingress.ingressClass) }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "plane.fullname" . }}-body-limit
  namespace: {{ .Release.Namespace }}
spec:
  buffering:
    maxRequestBodyBytes: {{ .Values.ingress.traefik.maxRequestBodyBytes | default 20971520 }}

{{- end }}
