{{- if .Values.services.opensearch.local_setup }}

apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "plane.fullname" . }}-opensearch
  labels:
    app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-opensearch
spec:
  type: ClusterIP
  {{- if not .Values.services.opensearch.assign_cluster_ip }}
  clusterIP: None
  {{- end }}
  ports:
    - name: opensearch-{{ .Values.services.opensearch.servicePort }}
      port: {{ .Values.services.opensearch.servicePort }}
      protocol: TCP
      targetPort: 9200
  selector:
    app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-opensearch
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "plane.fullname" . }}-opensearch-wl
  {{- include "plane.labelsAndAnnotations" .Values.services.opensearch }}
spec:
  selector:
    matchLabels:
      app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-opensearch
  serviceName: {{ (include "plane.fullname" .) }}-opensearch
  template:
    metadata:
      labels:
        app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-opensearch
    spec:
      {{- include "plane.podScheduling" .Values.services.opensearch }}
      securityContext:
        fsGroup: 1000
      containers:
        - image: {{ .Values.services.opensearch.image }}
          imagePullPolicy: {{ .Values.services.opensearch.pullPolicy | default "IfNotPresent" }}
          name: {{ include "plane.fullname" . }}-opensearch
          stdin: true
          tty: true
          resources:
            requests:
              memory: {{ .Values.services.opensearch.memoryRequest | default "2Gi" | quote }}
              cpu: {{ .Values.services.opensearch.cpuRequest | default "500m" | quote }}
            limits:
              memory: {{ .Values.services.opensearch.memoryLimit | default "3Gi" | quote }}
              cpu: {{ .Values.services.opensearch.cpuLimit | default "750m" | quote }}
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
          envFrom:
            - secretRef:
                name: {{ if not (empty .Values.external_secrets.opensearch_existingSecret) }}{{ .Values.external_secrets.opensearch_existingSecret }}{{ else }}{{ (include "plane.fullname" .) }}-opensearch-secrets{{ end }}
                optional: false
          env:
            - name: discovery.type
              value: "single-node"
            - name: bootstrap.memory_lock
              value: "false"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms768m -Xmx768m"
            - name: OPENSEARCH_USER
              valueFrom:
                secretKeyRef:
                  name: {{ if not (empty .Values.external_secrets.opensearch_existingSecret) }}{{ .Values.external_secrets.opensearch_existingSecret }}{{ else }}{{ (include "plane.fullname" .) }}-opensearch-secrets{{ end }}
                  key: OPENSEARCH_USERNAME
          {{- if .Values.extraEnv }}
          {{- toYaml .Values.extraEnv | nindent 10 }}
          {{- end }}
          command: [ "/bin/bash", "/docker-entrypoint-init.d/create-user.sh" ]
          volumeMounts:
            - mountPath: /usr/share/opensearch/data
              name: pvc-{{ include "plane.fullname" . }}-opensearch-vol
              subPath: ''
            - mountPath: /docker-entrypoint-init.d
              name: {{(include "plane.fullname" .)}}-opensearch-init-script
      serviceAccount: {{ (include "plane.fullname" .) }}-srv-account
      serviceAccountName: {{ (include "plane.fullname" .) }}-srv-account
      volumes:
        - name: {{(include "plane.fullname" .)}}-opensearch-init-script
          configMap:
            name: {{ include "plane.fullname" . }}-opensearch-init
            defaultMode: 0755
            items:
              - key: create-user.sh
                path: create-user.sh
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        creationTimestamp: null
        namespace: {{ .Release.Namespace }}
        name: pvc-{{ include "plane.fullname" . }}-opensearch-vol
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.services.opensearch.volumeSize | default "5Gi" | quote }}
        storageClassName: {{ .Values.env.storageClass | quote }}
        volumeMode: Filesystem

{{- end }}
