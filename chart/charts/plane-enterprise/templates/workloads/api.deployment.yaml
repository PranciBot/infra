apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "plane.fullname" . }}-api
  labels:
    app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-api
spec:
  type: ClusterIP
  {{- if not .Values.services.api.assign_cluster_ip }}
  clusterIP: None
  {{- end }}
  ports:
    - name: api-8000
      port: 8000
      protocol: TCP
      targetPort: 8000
  selector:
    app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-api

---

apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "plane.fullname" . }}-api-wl
  {{- include "plane.labelsAndAnnotations" .Values.services.api }}
spec:
  replicas: {{ .Values.services.api.replicas | default 1}}
  selector:
    matchLabels:
      app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-api
  template:
    metadata:
      namespace: {{ .Release.Namespace }}
      labels:
        app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-api
      annotations:
        timestamp: {{ now | quote }}
    spec:
      {{- include "plane.podScheduling" .Values.services.api }}
      {{- with (include "plane.s3CAVolumes" .) }}
{{ . | indent 6 }}
      {{- end }}
      containers:
        - name: {{ include "plane.fullname" . }}-api
          imagePullPolicy: {{ .Values.services.api.pullPolicy | default "Always" }}
          image: {{ .Values.services.api.image | default "artifacts.plane.so/makeplane/backend-commercial" }}:{{ .Values.planeVersion }}
          stdin: true
          tty: true
          resources:
            requests:
              memory: {{ .Values.services.api.memoryRequest | default "50Mi" | quote }}
              cpu: {{ .Values.services.api.cpuRequest | default "50m" | quote }}
            limits:
              memory: {{ .Values.services.api.memoryLimit  | default "1000Mi" | quote }}
              cpu: {{ .Values.services.api.cpuLimit | default "500m" | quote}}
        {{- with (include "plane.s3CAVolumeMounts" .) }}
{{ . | indent 8 }}
        {{- end }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
            {{- with (include "plane.s3CAInitScript" .) }}
{{ . | indent 12 }}
            {{- end }}

              # Start the API
              exec ./bin/docker-entrypoint-api-ee.sh
          envFrom:
            - configMapRef:
                name: {{ include "plane.fullname" . }}-app-vars
                optional: false
            - secretRef:
                name: {{ if not (empty .Values.external_secrets.app_env_existingSecret) }}{{ .Values.external_secrets.app_env_existingSecret }}{{ else }}{{ (include "plane.fullname" .) }}-app-secrets{{ end }}
                optional: false
            - secretRef:
                name: {{ if not (empty .Values.external_secrets.doc_store_existingSecret) }}{{ .Values.external_secrets.doc_store_existingSecret }}{{ else }}{{ (include "plane.fullname" .) }}-doc-store-secrets{{ end }}
                optional: false
            - secretRef:
                name: {{ if not (empty .Values.external_secrets.opensearch_existingSecret) }}{{ .Values.external_secrets.opensearch_existingSecret }}{{ else }}{{ (include "plane.fullname" .) }}-opensearch-secrets{{ end }}
                optional: false
          {{- if .Values.services.silo.enabled }}
            - secretRef:
                name: {{ if not (empty .Values.external_secrets.silo_env_existingSecret) }}{{ .Values.external_secrets.silo_env_existingSecret }}{{ else }}{{ (include "plane.fullname" .) }}-silo-secrets{{ end }}
                optional: false
          {{- end }}

        {{- if or .Values.extraEnv (include "plane.s3CAEnabled" .) }}
          env:
          {{- with (include "plane.s3CAEnvVars" .) }}
{{ . | indent 10 }}
          {{- end }}
          {{- if .Values.extraEnv }}
          {{- toYaml .Values.extraEnv | nindent 10 }}
          {{- end }}
        {{- end }}
          readinessProbe:
            failureThreshold: 30
            httpGet:
              path: /
              port: 8000
              scheme: HTTP
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1

      serviceAccount: {{ (include "plane.fullname" .) }}-srv-account
      serviceAccountName: {{ (include "plane.fullname" .) }}-srv-account
---
