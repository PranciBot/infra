{{- if and .Values.ingress.enabled (or (eq .Values.ingress.ingressClass "nginx") (eq .Values.ingress.ingressClass "kong")) .Values.license.licenseDomain }}

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "plane.fullname" . }}-ingress
  {{- if gt (len (default dict .Values.ingress.ingress_annotations)) 0 }}
  annotations:
    {{- range $key, $value := .Values.ingress.ingress_annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.ingressClass }}
  rules:
    - host: {{ .Values.license.licenseDomain }}
      http:
        paths:
          - backend:
              service:
                port:
                  number: 3000
                name: {{ include "plane.fullname" . }}-web
            path: /
            pathType: Prefix
          - backend:
              service:
                port:
                  number: 3000
                name: {{ include "plane.fullname" . }}-space
            path: /spaces/
            pathType: Prefix
          - backend:
              service:
                port:
                  number: 3000
                name: {{ include "plane.fullname" . }}-admin
            path: /god-mode/
            pathType: Prefix
          - backend:
              service:
                port:
                  number: 8000
                name: {{ include "plane.fullname" . }}-api
            path: /api/
            pathType: Prefix
          - backend:
              service:
                port:
                  number: 8000
                name: {{ include "plane.fullname" . }}-api
            path: /auth/
            pathType: Prefix
          - backend:
              service:
                port:
                  number: 3000
                name: {{ include "plane.fullname" . }}-live
            path: /live/
            pathType: Prefix
          - backend:
              service:
                port:
                  number: 8000
                name: {{ include "plane.fullname" . }}-api
            path: /graphql/
            pathType: Prefix
          - backend:
              service:
                port:
                  number: 8000
                name: {{ include "plane.fullname" . }}-api
            path: /marketplace/
            pathType: Prefix
          {{- if .Values.services.silo.enabled }}
          - backend:
              service:
                port:
                  number: 3000
                name: {{ include "plane.fullname" . }}-silo
            path: /silo/
            pathType: Prefix
          {{- end }}
          {{- if .Values.services.pi.enabled }}
          - backend:
              service:
                port:
                  number: 8000
                name: {{ include "plane.fullname" . }}-pi-api
            path: /pi/
            pathType: Prefix
          {{- end }}
          {{- if and .Values.services.minio.local_setup .Values.env.docstore_bucket }}
          - backend:
              service:
                port:
                  number: 9000
                name: {{ include "plane.fullname" . }}-minio
            path: /{{ .Values.env.docstore_bucket }}
            pathType: Prefix
          {{- end }}

    {{- if and .Values.services.minio.local_setup .Values.ingress.minioHost }}
    - host: {{ .Values.ingress.minioHost }}
      http:
        paths:
          - backend:
              service:
                port:
                  number: 9090
                name: {{ include "plane.fullname" . }}-minio
            path: /
            pathType: Prefix
    {{- end }}
    {{- if and .Values.services.rabbitmq.local_setup .Values.ingress.rabbitmqHost }}
    - host: {{ .Values.ingress.rabbitmqHost}}
      http:
        paths:
          - backend:
              service:
                port:
                  number: 15672
                name: {{ include "plane.fullname" . }}-rabbitmq
            path: /
            pathType: Prefix
    {{- end }}

  {{- if .Values.ssl.tls_secret_name}}
  tls:
    - hosts:
        - {{ .Values.license.licenseDomain | quote }}
      {{- if and .Values.services.minio.local_setup .Values.ingress.minioHost }}
        - {{ .Values.ingress.minioHost | quote }}
      {{ end }}
      {{- if and .Values.services.rabbitmq.local_setup .Values.ingress.rabbitmqHost }}
        - {{ .Values.ingress.rabbitmqHost | quote }}
      {{ end }}
      secretName: {{ .Values.ssl.tls_secret_name }}
  {{- else if and .Values.ssl.generateCerts .Values.ssl.createIssuer }}
  tls:
    - hosts:
        - {{ .Values.license.licenseDomain | quote }}
      {{- if and .Values.services.minio.local_setup .Values.ingress.minioHost }}
        - {{ .Values.ingress.minioHost | quote }}
      {{ end }}
      {{- if and .Values.services.rabbitmq.local_setup .Values.ingress.rabbitmqHost }}
        - {{ .Values.ingress.rabbitmqHost | quote }}
      {{ end }}
      secretName: {{ (include "plane.fullname" .) }}-ssl-cert
  {{- end }}

{{- end }}