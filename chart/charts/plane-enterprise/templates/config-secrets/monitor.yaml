apiVersion: v1
kind: ConfigMap
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "plane.fullname" . }}-monitor-vars
data:
  PRIME_HOST: {{ .Values.license.licenseServer | quote }}
  MACHINE_SIGNATURE: {{ include "hashString" . | quote }}
  APP_DOMAIN: {{ .Values.license.licenseDomain | quote }}
  APP_VERSION: {{ .Values.planeVersion | quote }}
  DEPLOY_PLATFORM: "KUBERNETES"
  API_URL: "http://{{ (include "plane.fullname" .) }}-api.{{ .Release.Namespace }}.svc.cluster.local:8000/"
  API_HOSTNAME: "http://{{ (include "plane.fullname" .) }}-api.{{ .Release.Namespace }}.svc.cluster.local:8000/"
  {{- if .Values.airgapped.enabled }}
  IS_AIRGAPPED: "1"
  {{- end }}