apiVersion: v1
automountServiceAccountToken: true
kind: ServiceAccount
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "plane.fullname" . }}-srv-account
{{- if .Values.dockerRegistry.enabled }}
imagePullSecrets:
{{- if .Values.dockerRegistry.existingSecret }}
  - name: {{ .Values.dockerRegistry.existingSecret }}
{{- else }}
  - name: {{ include "plane.fullname" . }}-docker-registry-credentials
{{- end }}
{{- end }}