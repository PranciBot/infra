{{- if and .Values.ingress.enabled (hasPrefix "traefik" .Values.ingress.ingressClass) .Values.license.licenseDomain }}

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "plane.fullname" . }}-ingress
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - websecure

  routes:

    # IMPORTANT: specific paths FIRST

    - match: Host(`{{ .Values.license.licenseDomain }}`) && PathPrefix(`/spaces/`)
      kind: Rule
      middlewares:
        - name: {{ include "plane.fullname" . }}-body-limit
      services:
        - name: {{ include "plane.fullname" . }}-space
          port: 3000

    - match: Host(`{{ .Values.license.licenseDomain }}`) && PathPrefix(`/god-mode/`)
      kind: Rule
      middlewares:
        - name: {{ include "plane.fullname" . }}-body-limit
      services:
        - name: {{ include "plane.fullname" . }}-admin
          port: 3000

    - match: Host(`{{ .Values.license.licenseDomain }}`) && PathPrefix(`/api/`)
      kind: Rule
      middlewares:
        - name: {{ include "plane.fullname" . }}-body-limit
      services:
        - name: {{ include "plane.fullname" . }}-api
          port: 8000

    - match: Host(`{{ .Values.license.licenseDomain }}`) && PathPrefix(`/auth/`)
      kind: Rule
      middlewares:
        - name: {{ include "plane.fullname" . }}-body-limit
      services:
        - name: {{ include "plane.fullname" . }}-api
          port: 8000

    - match: Host(`{{ .Values.license.licenseDomain }}`) && PathPrefix(`/graphql/`)
      kind: Rule
      middlewares:
        - name: {{ include "plane.fullname" . }}-body-limit
      services:
        - name: {{ include "plane.fullname" . }}-api
          port: 8000

    - match: Host(`{{ .Values.license.licenseDomain }}`) && PathPrefix(`/marketplace/`)
      kind: Rule
      middlewares:
        - name: {{ include "plane.fullname" . }}-body-limit
      services:
        - name: {{ include "plane.fullname" . }}-api
          port: 8000

    - match: Host(`{{ .Values.license.licenseDomain }}`) && PathPrefix(`/live/`)
      kind: Rule
      middlewares:
        - name: {{ include "plane.fullname" . }}-body-limit
      services:
        - name: {{ include "plane.fullname" . }}-live
          port: 3000

  {{- if .Values.services.silo.enabled }}
    - match: Host(`{{ .Values.license.licenseDomain }}`) && PathPrefix(`/silo/`)
      kind: Rule
      middlewares:
        - name: {{ include "plane.fullname" . }}-body-limit
      services:
        - name: {{ include "plane.fullname" . }}-silo
          port: 3000
  {{- end }}

  {{- if .Values.services.pi.enabled }}
    - match: Host(`{{ .Values.license.licenseDomain }}`) && PathPrefix(`/pi/`)
      kind: Rule
      middlewares:
        - name: {{ include "plane.fullname" . }}-body-limit
      services:
        - name: {{ include "plane.fullname" . }}-pi-api
          port: 8000
  {{- end }}

  {{- if and .Values.services.minio.local_setup .Values.env.docstore_bucket }}
    - match: Host(`{{ .Values.license.licenseDomain }}`) && PathPrefix(`/{{ .Values.env.docstore_bucket }}`)
      kind: Rule
      middlewares:
        - name: {{ include "plane.fullname" . }}-body-limit
      services:
        - name: {{ include "plane.fullname" . }}-minio
          port: 9000
  {{- end }}

    # LAST: catch all
    - match: Host(`{{ .Values.license.licenseDomain }}`) && PathPrefix(`/`)
      kind: Rule
      middlewares:
        - name: {{ include "plane.fullname" . }}-body-limit
      services:
        - name: {{ include "plane.fullname" . }}-web
          port: 3000

  tls:
    secretName: {{ default (printf "%s-ssl-cert" (include "plane.fullname" .)) .Values.ssl.tls_secret_name }}

{{- end }}
