{{- if .Values.services.email_service.enabled }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "plane.fullname" . }}-email-vars
  namespace: {{ .Release.Namespace }}
data:
  SMTP_DOMAIN: {{ .Values.env.email_service_envs.smtp_domain | default "" | quote }}
  MAX_ATTACHMENT_SIZE: {{ .Values.env.email_service_envs.max_attachment_size | default "10485760" | quote }}
  EMAIL_SAVE_ENDPOINT: "http://{{ (include "plane.fullname" .) }}-api.{{ .Release.Namespace }}.svc.cluster.local:8000/intake/email/"
  WEBHOOK_URL: "http://{{ (include "plane.fullname" .) }}-api.{{ .Release.Namespace }}.svc.cluster.local:8000/intake/email/"
  domain-blacklist.txt: |
    10minutemail.com
    10minutemail.net
    10minutemail.org
  spam.txt: |
    casino
    lottery
    jackpot

---
{{- end }}