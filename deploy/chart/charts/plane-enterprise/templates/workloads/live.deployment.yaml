apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "plane.fullname" . }}-live
  labels:
    app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-live
spec:
  type: ClusterIP
  {{- if not .Values.services.live.assign_cluster_ip }}
  clusterIP: None
  {{- end }}
  ports:
    - name: live-3000
      port: 3000
      protocol: TCP
      targetPort: 3000
  selector:
    app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-live

---

apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "plane.fullname" . }}-live-wl
  {{- include "plane.labelsAndAnnotations" .Values.services.live }}
spec:
  replicas: {{ .Values.services.live.replicas | default 1}}
  selector:
    matchLabels:
      app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-live
  template:
    metadata:
      namespace: {{ .Release.Namespace }}
      labels:
        app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-live
      annotations:
        timestamp: {{ now | quote }}
    spec:
      {{- include "plane.podScheduling" .Values.services.live }}
      {{- with (include "plane.s3CANodeVolumes" .) }}
{{ . | indent 6 }}
      {{- end }}
      {{- if include "plane.s3CAEnabled" . }}
      initContainers:
        - name: prepare-ca-bundle
          image: busybox
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Preparing custom CA bundle for Node.js..."
              if [ "$(ls -A /s3-custom-ca)" ]; then
                cat /s3-custom-ca/* > /ca-bundle/custom-ca-bundle.crt
                echo "CA bundle created at /ca-bundle/custom-ca-bundle.crt"
              else
                echo "No custom CA certificates found, creating empty bundle"
                touch /ca-bundle/custom-ca-bundle.crt
              fi
          volumeMounts:
            - name: s3-custom-ca
              mountPath: /s3-custom-ca
              readOnly: true
            - name: ca-bundle
              mountPath: /ca-bundle
      {{- end }}
      containers:
        - name: {{ include "plane.fullname" . }}-live
          imagePullPolicy: {{ .Values.services.live.pullPolicy | default "Always" }}
          image: {{ .Values.services.live.image | default "artifacts.plane.so/makeplane/live-commercial" }}:{{ .Values.planeVersion }}
          stdin: true
          tty: true
          resources:
            requests:
              memory: {{ .Values.services.live.memoryRequest | default "50Mi" | quote }}
              cpu: {{ .Values.services.live.cpuRequest | default "50m" | quote }}
            limits:
              memory: {{ .Values.services.live.memoryLimit  | default "1000Mi" | quote }}
              cpu: {{ .Values.services.live.cpuLimit | default "500m" | quote}}
        {{- with (include "plane.s3CANodeBundleMount" .) }}
{{ . | indent 8 }}
        {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "plane.fullname" . }}-live-vars
                optional: false
            - secretRef:
                name: {{ if not (empty .Values.external_secrets.live_env_existingSecret) }}{{ .Values.external_secrets.live_env_existingSecret }}{{ else }}{{ (include "plane.fullname" .) }}-live-secrets{{ end }}
                optional: false
        {{- if or .Values.extraEnv (include "plane.s3CAEnabled" .) }}
          env:
          {{- with (include "plane.s3CANodeEnvVars" .) }}
{{ . | indent 10 }}
          {{- end }}
          {{- if .Values.extraEnv }}
          {{- toYaml .Values.extraEnv | nindent 10 }}
          {{- end }}
        {{- end }}
      serviceAccount: {{ (include "plane.fullname" .) }}-srv-account
      serviceAccountName: {{ (include "plane.fullname" .) }}-srv-account
---
