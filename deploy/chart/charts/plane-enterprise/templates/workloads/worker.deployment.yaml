apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "plane.fullname" . }}-worker-wl
  {{- include "plane.labelsAndAnnotations" .Values.services.worker }}
spec:
  replicas: {{ .Values.services.worker.replicas | default 1 }}
  selector:
    matchLabels:
      app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-worker
  template:
    metadata:
      namespace: {{ .Release.Namespace }}
      labels:
        app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-worker
      annotations:
        timestamp: {{ now | quote }}
    spec:
      {{- include "plane.podScheduling" .Values.services.worker }}
      {{- with (include "plane.s3CAVolumes" .) }}
{{ . | indent 6 }}
      {{- end }}
      containers:
        - name: {{ include "plane.fullname" . }}-worker
          imagePullPolicy: {{ .Values.services.api.pullPolicy | default "Always" }}
          image: {{ .Values.services.api.image | default "artifacts.plane.so/makeplane/backend-commercial" }}:{{ .Values.planeVersion }}
          stdin: true
          tty: true
          resources:
            requests:
              memory: {{ .Values.services.worker.memoryRequest | default "50Mi" | quote }}
              cpu: {{ .Values.services.worker.cpuRequest | default "50m" | quote }}
            limits:
              memory: {{ .Values.services.worker.memoryLimit  | default "1000Mi" | quote }}
              cpu: {{ .Values.services.worker.cpuLimit | default "500m" | quote}}
        {{- with (include "plane.s3CAVolumeMounts" .) }}
{{ . | indent 8 }}
        {{- end }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
            {{- with (include "plane.s3CAInitScript" .) }}
{{ . | indent 12 }}
            {{- end }}

              # Start the worker
              exec ./bin/docker-entrypoint-worker.sh
          envFrom:
            - configMapRef:
                name: {{ include "plane.fullname" . }}-app-vars
                optional: false
            - secretRef:
                name: {{ if not (empty .Values.external_secrets.app_env_existingSecret) }}{{ .Values.external_secrets.app_env_existingSecret }}{{ else }}{{ (include "plane.fullname" .) }}-app-secrets{{ end }}
                optional: false
            - secretRef:
                name: {{ if not (empty .Values.external_secrets.doc_store_existingSecret) }}{{ .Values.external_secrets.doc_store_existingSecret }}{{ else }}{{ (include "plane.fullname" .) }}-doc-store-secrets{{ end }}
                optional: false
            - secretRef:
                name: {{ if not (empty .Values.external_secrets.opensearch_existingSecret) }}{{ .Values.external_secrets.opensearch_existingSecret }}{{ else }}{{ (include "plane.fullname" .) }}-opensearch-secrets{{ end }}
                optional: false
          {{- if .Values.services.silo.enabled }}
            - secretRef:
                name: {{ if not (empty .Values.external_secrets.silo_env_existingSecret) }}{{ .Values.external_secrets.silo_env_existingSecret }}{{ else }}{{ (include "plane.fullname" .) }}-silo-secrets{{ end }}
                optional: false
          {{- end }}

        {{- if or .Values.extraEnv (include "plane.s3CAEnabled" .) }}
          env:
          {{- with (include "plane.s3CAEnvVars" .) }}
{{ . | indent 10 }}
          {{- end }}
          {{- if .Values.extraEnv }}
          {{- toYaml .Values.extraEnv | nindent 10 }}
          {{- end }}
        {{- end }}

      serviceAccount: {{ (include "plane.fullname" .) }}-srv-account
      serviceAccountName: {{ (include "plane.fullname" .) }}-srv-account
---
