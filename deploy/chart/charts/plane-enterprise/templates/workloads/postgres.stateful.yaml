{{- if .Values.services.postgres.local_setup }}

apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "plane.fullname" . }}-pgdb
  labels:
    app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-pgdb
spec:
  type: ClusterIP
  {{- if not .Values.services.postgres.assign_cluster_ip }}
  clusterIP: None
  {{- end }}
  ports:
    - name: pg-{{ .Values.services.postgres.servicePort }}
      port: {{ .Values.services.postgres.servicePort }}
      protocol: TCP
      targetPort: 5432
  selector:
    app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-pgdb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "plane.fullname" . }}-pgdb-wl
  {{- include "plane.labelsAndAnnotations" .Values.services.postgres }}
spec:
  selector:
    matchLabels:
      app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-pgdb
  serviceName: {{ (include "plane.fullname" .) }}-pgdb
  template:
    metadata:
      labels:
        app.name: {{ .Release.Namespace }}-{{ (include "plane.fullname" .) }}-pgdb
    spec:
      {{- include "plane.podScheduling" .Values.services.postgres }}
      containers:
        - image: {{ .Values.services.postgres.image }}
          imagePullPolicy: {{ .Values.services.postgres.pullPolicy | default "IfNotPresent" }}
          name: {{ include "plane.fullname" . }}-pgdb
          stdin: true
          tty: true
          envFrom:
            - secretRef:
                name: {{ if not (empty .Values.external_secrets.pgdb_existingSecret) }}{{ .Values.external_secrets.pgdb_existingSecret }}{{ else }}{{ (include "plane.fullname" .) }}-pgdb-secrets{{ end }}
                optional: false
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/plane
          {{- if .Values.extraEnv }}
          {{- toYaml .Values.extraEnv | nindent 10 }}
          {{- end }}
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: pvc-{{ include "plane.fullname" . }}-pgdb-vol
              subPath: ''
            - mountPath: /docker-entrypoint-initdb.d
              name: {{(include "plane.fullname" .)}}-init-script
      serviceAccount: {{ (include "plane.fullname" .) }}-srv-account
      serviceAccountName: {{ (include "plane.fullname" .) }}-srv-account
      volumes:
        - name: {{(include "plane.fullname" .)}}-init-script
          configMap:
            name: {{ include "plane.fullname" . }}-pgdb-vars
            items:
              - key: init-dbs.sql
                path: init-dbs.sql
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        creationTimestamp: null
        namespace: {{ .Release.Namespace }}
        name: pvc-{{ include "plane.fullname" . }}-pgdb-vol
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.services.postgres.volumeSize | default "5Gi" | quote }}
        storageClassName: {{ .Values.env.storageClass | quote }}
        volumeMode: Filesystem

{{- end }}